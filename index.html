<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Pokédex Matchup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0a1a; }
    #root { min-height: 100vh; }

    .pkmn-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
      z-index: 1;
    }
    .type-btn { transition: all 0.15s ease; }
    .type-btn:hover { transform: translate(-2px, -2px); }
    .type-btn:active { transform: translate(1px, 1px); }
    .mode-btn, .sub-tab, .slot-card, .reco-card { transition: all 0.15s ease; }
    .slot-card:hover { transform: translate(-1px, -1px); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useMemo } = React;

    const TYPES = [
      'Normal', 'Fire', 'Water', 'Electric', 'Grass', 'Ice',
      'Fighting', 'Poison', 'Ground', 'Flying', 'Psychic', 'Bug',
      'Rock', 'Ghost', 'Dragon', 'Dark', 'Steel', 'Fairy'
    ];

    const TYPE_COLORS = {
      Normal:   { bg: '#A8A77A', text: '#2D2D1F', glow: '#C5C397' },
      Fire:     { bg: '#EE8130', text: '#3A1A05', glow: '#FFA559' },
      Water:    { bg: '#6390F0', text: '#0A1F4D', glow: '#8FB3FF' },
      Electric: { bg: '#F7D02C', text: '#3D3000', glow: '#FFE45C' },
      Grass:    { bg: '#7AC74C', text: '#143300', glow: '#9EE070' },
      Ice:      { bg: '#96D9D6', text: '#0F3D3B', glow: '#BFEDEB' },
      Fighting: { bg: '#C22E28', text: '#FFE5E5', glow: '#E84D47' },
      Poison:   { bg: '#A33EA1', text: '#FFE5FE', glow: '#C760C5' },
      Ground:   { bg: '#E2BF65', text: '#3D2E08', glow: '#F2D689' },
      Flying:   { bg: '#A98FF3', text: '#1A0F4A', glow: '#C7B5FF' },
      Psychic:  { bg: '#F95587', text: '#4A0A24', glow: '#FF7DA6' },
      Bug:      { bg: '#A6B91A', text: '#2A3000', glow: '#C9DD3D' },
      Rock:     { bg: '#B6A136', text: '#332C05', glow: '#D6C155' },
      Ghost:    { bg: '#735797', text: '#E8DFF5', glow: '#9577B8' },
      Dragon:   { bg: '#6F35FC', text: '#E5DBFF', glow: '#9163FF' },
      Dark:     { bg: '#705746', text: '#F0E5DC', glow: '#947463' },
      Steel:    { bg: '#B7B7CE', text: '#1F1F33', glow: '#D4D4E8' },
      Fairy:    { bg: '#D685AD', text: '#3D1428', glow: '#F0A6CC' },
    };

    const CHART = {
      Normal:   { Rock: 0.5, Ghost: 0,   Steel: 0.5 },
      Fire:     { Fire: 0.5, Water: 0.5, Grass: 2,   Ice: 2,    Bug: 2,    Rock: 0.5, Dragon: 0.5, Steel: 2 },
      Water:    { Fire: 2,   Water: 0.5, Grass: 0.5, Ground: 2, Rock: 2,   Dragon: 0.5 },
      Electric: { Water: 2,  Electric: 0.5, Grass: 0.5, Ground: 0, Flying: 2, Dragon: 0.5 },
      Grass:    { Fire: 0.5, Water: 2,   Grass: 0.5, Poison: 0.5, Ground: 2, Flying: 0.5, Bug: 0.5, Rock: 2, Dragon: 0.5, Steel: 0.5 },
      Ice:      { Fire: 0.5, Water: 0.5, Grass: 2,   Ice: 0.5,  Ground: 2, Flying: 2, Dragon: 2, Steel: 0.5 },
      Fighting: { Normal: 2, Ice: 2,     Poison: 0.5, Flying: 0.5, Psychic: 0.5, Bug: 0.5, Rock: 2, Ghost: 0, Dark: 2, Steel: 2, Fairy: 0.5 },
      Poison:   { Grass: 2,  Poison: 0.5, Ground: 0.5, Rock: 0.5, Ghost: 0.5, Steel: 0, Fairy: 2 },
      Ground:   { Fire: 2,   Electric: 2, Grass: 0.5, Poison: 2, Flying: 0, Bug: 0.5, Rock: 2, Steel: 2 },
      Flying:   { Electric: 0.5, Grass: 2, Fighting: 2, Bug: 2, Rock: 0.5, Steel: 0.5 },
      Psychic:  { Fighting: 2, Poison: 2, Psychic: 0.5, Dark: 0, Steel: 0.5 },
      Bug:      { Fire: 0.5, Grass: 2,   Fighting: 0.5, Poison: 0.5, Flying: 0.5, Psychic: 2, Ghost: 0.5, Dark: 2, Steel: 0.5, Fairy: 0.5 },
      Rock:     { Fire: 2,   Ice: 2,     Fighting: 0.5, Ground: 0.5, Flying: 2, Bug: 2, Steel: 0.5 },
      Ghost:    { Normal: 0, Psychic: 2, Ghost: 2,   Dark: 0.5 },
      Dragon:   { Dragon: 2, Steel: 0.5, Fairy: 0 },
      Dark:     { Fighting: 0.5, Psychic: 2, Ghost: 2, Dark: 0.5, Fairy: 0.5 },
      Steel:    { Fire: 0.5, Water: 0.5, Electric: 0.5, Ice: 2, Rock: 2, Steel: 0.5, Fairy: 2 },
      Fairy:    { Fire: 0.5, Fighting: 2, Poison: 0.5, Dragon: 2, Dark: 2, Steel: 0.5 },
    };

    function calcMultiplier(attacker, type1, type2) {
      const m1 = CHART[attacker]?.[type1] ?? 1;
      if (!type2) return m1;
      const m2 = CHART[attacker]?.[type2] ?? 1;
      return m1 * m2;
    }

    function groupByMultiplier(type1, type2) {
      const buckets = { 4: [], 2: [], 1: [], 0.5: [], 0.25: [], 0: [] };
      TYPES.forEach((atk) => {
        const m = calcMultiplier(atk, type1, type2);
        if (buckets[m] != null) buckets[m].push(atk);
        else buckets[1].push(atk);
      });
      return buckets;
    }

    function offensiveFromType(attacker) {
      const buckets = { 2: [], 1: [], 0.5: [], 0: [] };
      TYPES.forEach((def) => {
        const m = CHART[attacker]?.[def] ?? 1;
        if (buckets[m] != null) buckets[m].push(def);
      });
      return buckets;
    }

    function attackingTypeScore(attacker, team) {
      let score = 0;
      team.forEach((member) => {
        if (!member) return;
        const m = calcMultiplier(attacker, member.type1, member.type2);
        if (m === 4) score += 4;
        else if (m === 2) score += 2;
        else if (m === 0.5) score -= 1;
        else if (m === 0.25) score -= 2;
        else if (m === 0) score -= 3;
      });
      return score;
    }

    function teamThreatScore(team) {
      let total = 0;
      TYPES.forEach((atk) => {
        const s = attackingTypeScore(atk, team);
        if (s > 0) total += s;
      });
      return total;
    }

    function analyseTeam(team) {
      const valid = team.filter(m => m && m.type1);
      const result = {};
      TYPES.forEach((atkType) => {
        let weak = 0, quadWeak = 0, neutral = 0, resist = 0, doubleResist = 0, immune = 0;
        valid.forEach((member) => {
          const m = calcMultiplier(atkType, member.type1, member.type2);
          if (m === 0) immune++;
          else if (m === 0.25) doubleResist++;
          else if (m === 0.5) resist++;
          else if (m === 1) neutral++;
          else if (m === 2) weak++;
          else if (m === 4) quadWeak++;
        });
        const score = (quadWeak * 4) + (weak * 2) - (resist * 1) - (doubleResist * 2) - (immune * 3);
        result[atkType] = { weak, quadWeak, neutral, resist, doubleResist, immune, score, total: valid.length };
      });
      return result;
    }

    function generateAllCombos() {
      const combos = [];
      TYPES.forEach(t => combos.push({ type1: t, type2: null }));
      for (let i = 0; i < TYPES.length; i++) {
        for (let j = i + 1; j < TYPES.length; j++) {
          combos.push({ type1: TYPES[i], type2: TYPES[j] });
        }
      }
      return combos;
    }
    const ALL_COMBOS = generateAllCombos();

    function recommendAdditions(team, topN = 5) {
      const baseline = teamThreatScore(team);
      const results = ALL_COMBOS.map((combo) => {
        const newTeam = [...team];
        const emptyIdx = newTeam.findIndex(s => s === null);
        if (emptyIdx === -1) newTeam.push(combo);
        else newTeam[emptyIdx] = combo;
        const newScore = teamThreatScore(newTeam);
        return { combo, newScore, improvement: baseline - newScore };
      });
      results.sort((a, b) => b.improvement - a.improvement);
      return { baseline, results: results.slice(0, topN) };
    }

    function recommendSwaps(team) {
      const baseline = teamThreatScore(team);
      const swaps = [];
      team.forEach((member, idx) => {
        if (!member) return;
        let bestImprovement = -Infinity;
        let bestCombo = null;
        let bestScore = baseline;
        ALL_COMBOS.forEach((combo) => {
          if (combo.type1 === member.type1 && combo.type2 === member.type2) return;
          if (combo.type1 === member.type2 && combo.type2 === member.type1) return;
          const newTeam = [...team];
          newTeam[idx] = { ...member, type1: combo.type1, type2: combo.type2 };
          const newScore = teamThreatScore(newTeam);
          const improvement = baseline - newScore;
          if (improvement > bestImprovement) {
            bestImprovement = improvement;
            bestCombo = combo;
            bestScore = newScore;
          }
        });
        swaps.push({ slotIdx: idx, original: member, bestReplacement: bestCombo, improvement: bestImprovement, newScore: bestScore });
      });
      swaps.sort((a, b) => b.improvement - a.improvement);
      return { baseline, swaps };
    }

    // Evaluate matchup between attacker (you) and defender (opponent)
    // attacker.moves used to attack defender's typing
    // defender.moves used to attack attacker's typing
    function evaluateMatchup(attacker, defender) {
      // Defense: attacker takes damage from defender's moves
      let defenseScore = 0;
      const moveBreakdown = [];
      (defender.moves || []).forEach((moveType) => {
        if (!moveType) return;
        const m = calcMultiplier(moveType, attacker.type1, attacker.type2);
        let pts;
        if (m === 0) pts = 3;
        else if (m === 0.25) pts = 2;
        else if (m === 0.5) pts = 1;
        else if (m === 1) pts = 0;
        else if (m === 2) pts = -2;
        else if (m === 4) pts = -4;
        else pts = 0;
        defenseScore += pts;
        moveBreakdown.push({ moveType, multiplier: m, pts });
      });

      // Offense: attacker hits defender with attacker's moves (or fall back to STAB)
      let offenseScore = 0;
      const offenseDetails = [];
      const attackerMoves = (attacker.moves || []).filter(Boolean);

      if (attackerMoves.length > 0) {
        // Use actual moveset - take BEST move
        let bestMult = 0;
        let bestMove = null;
        attackerMoves.forEach((moveType) => {
          const m = calcMultiplier(moveType, defender.type1, defender.type2);
          offenseDetails.push({ moveType, multiplier: m });
          if (m > bestMult) { bestMult = m; bestMove = moveType; }
        });
        if (bestMult === 4) offenseScore = 3;
        else if (bestMult === 2) offenseScore = 2;
        else if (bestMult === 1) offenseScore = 0;
        else if (bestMult === 0.5) offenseScore = -1;
        else if (bestMult === 0.25) offenseScore = -2;
        else if (bestMult === 0) offenseScore = -4;
        return {
          defenseScore, offenseScore,
          totalScore: defenseScore + offenseScore,
          moveBreakdown, offenseDetails,
          bestMove, bestMoveMult: bestMult,
          usingMoveset: true,
        };
      } else {
        // Fall back to STAB
        let bestMult = calcMultiplier(attacker.type1, defender.type1, defender.type2);
        let bestType = attacker.type1;
        offenseDetails.push({ moveType: attacker.type1, multiplier: bestMult });
        if (attacker.type2) {
          const m2 = calcMultiplier(attacker.type2, defender.type1, defender.type2);
          offenseDetails.push({ moveType: attacker.type2, multiplier: m2 });
          if (m2 > bestMult) { bestMult = m2; bestType = attacker.type2; }
        }
        if (bestMult === 4) offenseScore = 3;
        else if (bestMult === 2) offenseScore = 2;
        else if (bestMult === 1) offenseScore = 0;
        else if (bestMult === 0.5) offenseScore = -1;
        else if (bestMult === 0.25) offenseScore = -2;
        else if (bestMult === 0) offenseScore = -4;
        return {
          defenseScore, offenseScore,
          totalScore: defenseScore + offenseScore,
          moveBreakdown, offenseDetails,
          bestMove: bestType, bestMoveMult: bestMult,
          usingMoveset: false,
        };
      }
    }

    function rankYourTeamVsEnemy(yourTeam, enemyMon) {
      return yourTeam
        .map((member, idx) => member ? { slotIdx: idx, member, ...evaluateMatchup(member, enemyMon) } : null)
        .filter(Boolean)
        .sort((a, b) => b.totalScore - a.totalScore);
    }

    function rankEnemyVsYourMon(enemyTeam, yourMon) {
      return enemyTeam
        .map((member, idx) => member ? { slotIdx: idx, member, ...evaluateMatchup(member, yourMon) } : null)
        .filter(Boolean)
        .sort((a, b) => b.totalScore - a.totalScore);
    }

    // Find the top N theoretical type combos that best counter the entire enemy team.
    // Score for each candidate combo = sum of evaluateMatchup totals against each enemy mon.
    // The candidate has no moves (so it falls back to STAB for offence calc).
    function findBestTheoreticalCounters(enemyTeam, topN = 3) {
      const validEnemies = enemyTeam.filter(Boolean);
      if (validEnemies.length === 0) return [];
      const results = ALL_COMBOS.map((combo) => {
        // Treat combo as a moveless attacker
        const candidate = { type1: combo.type1, type2: combo.type2, moves: [null, null, null, null] };
        let totalScore = 0;
        let bestVs = null, bestVsScore = -Infinity;
        let worstVs = null, worstVsScore = Infinity;
        validEnemies.forEach((enemy) => {
          const m = evaluateMatchup(candidate, enemy);
          totalScore += m.totalScore;
          if (m.totalScore > bestVsScore) { bestVsScore = m.totalScore; bestVs = enemy; }
          if (m.totalScore < worstVsScore) { worstVsScore = m.totalScore; worstVs = enemy; }
        });
        return {
          combo,
          totalScore,
          avgScore: totalScore / validEnemies.length,
          bestVs, bestVsScore,
          worstVs, worstVsScore,
        };
      });
      results.sort((a, b) => b.totalScore - a.totalScore);
      return results.slice(0, topN);
    }

    const TypeBadge = ({ type, size = 'md' }) => {
      const c = TYPE_COLORS[type];
      const sizes = {
        xs: { padding: '3px 8px', fontSize: '8px' },
        sm: { padding: '4px 10px', fontSize: '10px' },
        md: { padding: '6px 14px', fontSize: '12px' },
        lg: { padding: '10px 18px', fontSize: '15px' },
      };
      return (
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: '6px',
          background: c.bg, color: c.text,
          fontFamily: '"Press Start 2P", monospace', letterSpacing: '0.5px', textTransform: 'uppercase',
          borderRadius: '2px', boxShadow: `0 0 0 2px ${c.text}, 3px 3px 0 0 ${c.text}`,
          ...sizes[size],
        }}>{type}</span>
      );
    };

    const ComboBadges = ({ combo, size = 'xs' }) => (
      <div style={{ display: 'inline-flex', gap: '4px', alignItems: 'center', flexWrap: 'wrap' }}>
        <TypeBadge type={combo.type1} size={size} />
        {combo.type2 && (<>
          <span style={{ color: '#888', fontFamily: '"Press Start 2P", monospace', fontSize: '9px' }}>/</span>
          <TypeBadge type={combo.type2} size={size} />
        </>)}
      </div>
    );

    const Section = ({ title, types, accent, sublabel }) => (
      <div style={{ marginBottom: '18px' }}>
        <div style={{
          fontFamily: '"Press Start 2P", monospace', fontSize: '10px', color: accent,
          marginBottom: '10px', letterSpacing: '1px', textShadow: `2px 2px 0 rgba(0,0,0,0.3)`,
        }}>
          ▸ {title}
          {sublabel && (<span style={{ fontFamily: '"VT323", monospace', fontSize: '16px', color: '#999', marginLeft: '8px', letterSpacing: 0 }}>{sublabel}</span>)}
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
          {types.length === 0 ? (
            <span style={{ fontFamily: '"VT323", monospace', fontSize: '18px', color: '#666', fontStyle: 'italic', paddingLeft: '8px' }}>— none —</span>
          ) : types.map((t) => <TypeBadge key={t} type={t} size="sm" />)}
        </div>
      </div>
    );

    const panelStyle = (c) => ({
      background: 'rgba(0,0,0,0.55)', border: `3px solid ${c.bg}`, borderRadius: '4px',
      padding: '24px', position: 'relative', boxShadow: `6px 6px 0 0 rgba(0,0,0,0.5)`,
    });
    const panelDescStyle = () => ({
      fontFamily: '"VT323", monospace', fontSize: '18px', color: '#bbb',
      marginTop: '12px', marginBottom: '20px', lineHeight: 1.3,
    });
    const PanelTag = ({ c, label }) => (
      <div style={{
        position: 'absolute', top: '-14px', left: '20px',
        background: c.bg, color: c.text, fontFamily: '"Press Start 2P", monospace',
        fontSize: '11px', padding: '6px 14px', letterSpacing: '1px', boxShadow: `0 0 0 2px ${c.text}`,
      }}>{label}</div>
    );

    function multColor(m) {
      if (m === 0) return '#5DCFFF';
      if (m === 0.25) return '#5DFF8F';
      if (m === 0.5) return '#9DFF9D';
      if (m === 1) return '#bbb';
      if (m === 2) return '#FF8F5D';
      if (m === 4) return '#FF3D3D';
      return '#bbb';
    }
    function multLabel(m) {
      if (m === 0) return '0×';
      if (m === 0.25) return '¼×';
      if (m === 0.5) return '½×';
      if (m === 1) return '1×';
      if (m === 2) return '2×';
      if (m === 4) return '4×';
      return `${m}×`;
    }

    // ============ MAIN COMPONENT ============
    function PokemonTypeChart() {
      const [mode, setMode] = useState('defensive');
      const [type1, setType1] = useState('Fire');
      const [type2, setType2] = useState(null);

      // Team mode: 'analysis' or 'counter'
      const [teamSubMode, setTeamSubMode] = useState('analysis');

      // Both teams now have moves: { type1, type2, moves: [t1,t2,t3,t4] }
      const emptyTeam = () => [null, null, null, null, null, null];
      const [yourTeam, setYourTeam] = useState(emptyTeam());
      const [enemyTeam, setEnemyTeam] = useState(emptyTeam());

      // Show recommendations
      const [showRecos, setShowRecos] = useState(false);

      // Counter mode state
      const [activeTeamSide, setActiveTeamSide] = useState('your'); // 'your' or 'enemy'
      const [editingSlot, setEditingSlot] = useState(0);
      // editTarget within slot: 'type' (sets typing) or 'move0','move1','move2','move3'
      const [editTarget, setEditTarget] = useState('type');
      const [locked, setLocked] = useState(false);
      const [selectedEnemyIdx, setSelectedEnemyIdx] = useState(null);

      const c = TYPE_COLORS[type1];

      // ============ CLICK HANDLERS ============
      const handleTypeClickStandalone = (t) => {
        // Defensive/Offensive mode
        if (mode === 'offensive') { setType1(t); setType2(null); return; }
        if (t === type1) { if (type2) { setType1(type2); setType2(null); } return; }
        if (t === type2) { setType2(null); return; }
        if (!type2) setType2(t); else setType2(t);
      };

      const handleTypeClickAnalysis = (t) => {
        // Team analysis mode (no moves, just typing)
        const slot = yourTeam[editingSlot];
        const newTeam = [...yourTeam];
        if (!slot) {
          newTeam[editingSlot] = { type1: t, type2: null, moves: [null, null, null, null] };
        } else if (slot.type1 === t) {
          if (slot.type2) newTeam[editingSlot] = { ...slot, type1: slot.type2, type2: null };
          else newTeam[editingSlot] = null;
        } else if (slot.type2 === t) {
          newTeam[editingSlot] = { ...slot, type2: null };
        } else if (!slot.type2) {
          newTeam[editingSlot] = { ...slot, type2: t };
        } else {
          newTeam[editingSlot] = { ...slot, type2: t };
        }
        setYourTeam(newTeam);
      };

      const handleTypeClickCounter = (t) => {
        if (locked) return;
        const team = activeTeamSide === 'your' ? yourTeam : enemyTeam;
        const setTeam = activeTeamSide === 'your' ? setYourTeam : setEnemyTeam;
        const slot = team[editingSlot];
        const newTeam = [...team];

        if (editTarget === 'type') {
          // Edit typing
          if (!slot) {
            newTeam[editingSlot] = { type1: t, type2: null, moves: [null, null, null, null] };
          } else if (slot.type1 === t) {
            if (slot.type2) newTeam[editingSlot] = { ...slot, type1: slot.type2, type2: null };
            else newTeam[editingSlot] = null;
          } else if (slot.type2 === t) {
            newTeam[editingSlot] = { ...slot, type2: null };
          } else if (!slot.type2) {
            newTeam[editingSlot] = { ...slot, type2: t };
          } else {
            newTeam[editingSlot] = { ...slot, type2: t };
          }
        } else if (editTarget.startsWith('move')) {
          // Edit move slot
          if (!slot) return; // can't add move to empty slot
          const moveIdx = parseInt(editTarget.slice(4), 10);
          const newMoves = [...(slot.moves || [null, null, null, null])];
          if (newMoves[moveIdx] === t) newMoves[moveIdx] = null;
          else newMoves[moveIdx] = t;
          newTeam[editingSlot] = { ...slot, moves: newMoves };

          // Auto-advance to next empty move
          const nextEmpty = newMoves.findIndex((m, i) => i > moveIdx && !m);
          if (nextEmpty !== -1) setEditTarget(`move${nextEmpty}`);
        }
        setTeam(newTeam);
      };

      // ============ DERIVED STATE ============
      const yourTeamSize = yourTeam.filter(Boolean).length;
      const enemyTeamSize = enemyTeam.filter(Boolean).length;

      const teamAnalysis = useMemo(
        () => (mode === 'team' && teamSubMode === 'analysis') ? analyseTeam(yourTeam) : null,
        [mode, teamSubMode, yourTeam]
      );
      const sortedThreats = useMemo(() => {
        if (!teamAnalysis) return [];
        return TYPES.map(t => ({ type: t, ...teamAnalysis[t] })).sort((a, b) => b.score - a.score);
      }, [teamAnalysis]);

      const recommendations = useMemo(() => {
        if (mode !== 'team' || teamSubMode !== 'analysis' || !showRecos || yourTeamSize === 0) return null;
        const additions = recommendAdditions(yourTeam, 5);
        const swaps = yourTeamSize >= 2 ? recommendSwaps(yourTeam) : null;
        return { additions, swaps };
      }, [mode, teamSubMode, showRecos, yourTeam, yourTeamSize]);

      const defensiveBuckets = useMemo(
        () => (mode === 'defensive' ? groupByMultiplier(type1, type2) : null),
        [mode, type1, type2]
      );
      const offensiveBuckets = useMemo(
        () => (mode === 'offensive' ? offensiveFromType(type1) : null),
        [mode, type1]
      );

      // For type grid highlighting
      const typeHighlight = useMemo(() => {
        if (mode === 'team' && teamSubMode === 'counter' && !locked) {
          const team = activeTeamSide === 'your' ? yourTeam : enemyTeam;
          const slot = team[editingSlot];
          if (!slot) return null;
          if (editTarget === 'type') return { primary: slot.type1, secondary: slot.type2 };
          if (editTarget.startsWith('move')) {
            const moveIdx = parseInt(editTarget.slice(4), 10);
            return { primary: slot.moves?.[moveIdx] };
          }
        }
        if (mode === 'team' && teamSubMode === 'analysis') {
          const slot = yourTeam[editingSlot];
          if (slot) return { primary: slot.type1, secondary: slot.type2 };
        }
        if (mode === 'defensive') return { primary: type1, secondary: type2 };
        if (mode === 'offensive') return { primary: type1 };
        return null;
      }, [mode, teamSubMode, locked, activeTeamSide, yourTeam, enemyTeam, editingSlot, editTarget, type1, type2]);

      const hideTypeGrid = mode === 'team' && teamSubMode === 'counter' && locked;

      // ============ RENDER ============
      return (
        <div className="pkmn-bg" style={{
          minHeight: '100vh',
          background: `radial-gradient(circle at 20% 10%, ${c.glow}25 0%, transparent 50%),
                       radial-gradient(circle at 80% 80%, ${c.bg}20 0%, transparent 50%),
                       linear-gradient(180deg, #0a0a1a 0%, #1a0a2a 100%)`,
          padding: '32px 18px', position: 'relative', overflow: 'hidden', transition: 'background 0.6s ease',
        }}>
          <div style={{ maxWidth: '1100px', margin: '0 auto', position: 'relative', zIndex: 2 }}>
            <Header c={c} />

            <div style={{ display: 'flex', gap: '8px', justifyContent: 'center', marginBottom: '24px', flexWrap: 'wrap' }}>
              {[{ id: 'defensive', label: '🛡 DEFENSIVE' }, { id: 'offensive', label: '⚔ OFFENSIVE' }, { id: 'team', label: '👥 TEAM' }].map((m) => {
                const active = mode === m.id;
                return (
                  <button key={m.id} className="mode-btn" onClick={() => setMode(m.id)} style={{
                    background: active ? c.bg : 'rgba(0,0,0,0.5)', color: active ? c.text : '#aaa',
                    fontFamily: '"Press Start 2P", monospace', fontSize: '10px',
                    padding: '12px 16px', border: 'none', borderRadius: '2px', cursor: 'pointer', letterSpacing: '1px',
                    boxShadow: active ? `0 0 0 3px #fff, 0 0 0 5px ${c.text}, 0 0 25px ${c.glow}` : `0 0 0 2px rgba(255,255,255,0.2), 4px 4px 0 0 rgba(0,0,0,0.5)`,
                    transform: active ? 'translate(-1px, -1px)' : 'none',
                  }}>{m.label}</button>
                );
              })}
            </div>

            {mode === 'team' && (
              <>
                <div style={{ display: 'flex', gap: '6px', justifyContent: 'center', marginBottom: '20px', flexWrap: 'wrap' }}>
                  {[{ id: 'analysis', label: '📊 TEAM ANALYSIS' }, { id: 'counter', label: '🎯 COUNTER TEAM' }].map((sm) => {
                    const active = teamSubMode === sm.id;
                    return (
                      <button key={sm.id} className="sub-tab" onClick={() => { setTeamSubMode(sm.id); setLocked(false); setSelectedEnemyIdx(null); }} style={{
                        background: active ? `${c.bg}40` : 'transparent', color: active ? c.glow : '#888',
                        fontFamily: '"Press Start 2P", monospace', fontSize: '9px',
                        padding: '8px 14px', border: active ? `2px solid ${c.bg}` : '2px solid rgba(255,255,255,0.1)',
                        borderRadius: '2px', cursor: 'pointer', letterSpacing: '1px',
                      }}>{sm.label}</button>
                    );
                  })}
                </div>
              </>
            )}

            {/* TEAM ANALYSIS */}
            {mode === 'team' && teamSubMode === 'analysis' && (
              <AnalysisView
                yourTeam={yourTeam} setYourTeam={setYourTeam}
                editingSlot={editingSlot} setEditingSlot={setEditingSlot}
                showRecos={showRecos} setShowRecos={setShowRecos}
                yourTeamSize={yourTeamSize}
                accentColor={c}
              />
            )}

            {/* COUNTER TEAM */}
            {mode === 'team' && teamSubMode === 'counter' && (
              <CounterView
                yourTeam={yourTeam} setYourTeam={setYourTeam}
                enemyTeam={enemyTeam} setEnemyTeam={setEnemyTeam}
                activeTeamSide={activeTeamSide} setActiveTeamSide={setActiveTeamSide}
                editingSlot={editingSlot} setEditingSlot={setEditingSlot}
                editTarget={editTarget} setEditTarget={setEditTarget}
                locked={locked} setLocked={setLocked}
                selectedEnemyIdx={selectedEnemyIdx} setSelectedEnemyIdx={setSelectedEnemyIdx}
                accentColor={c}
              />
            )}

            {/* DEFENSIVE / OFFENSIVE description */}
            {mode !== 'team' && (
              <div style={{ textAlign: 'center', fontFamily: '"VT323", monospace', fontSize: '20px', color: '#bbb', marginBottom: '16px', padding: '0 10px' }}>
                {mode === 'defensive' ? (type2 ? 'Tap a third type to swap your secondary, or tap selected to deselect' : 'Tap one or two types to build a dual-type defender') : 'Tap a type — see what its moves do offensively'}
              </div>
            )}

            {/* TYPE GRID */}
            {!hideTypeGrid && (
              <div style={{
                display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(110px, 1fr))', gap: '8px',
                marginBottom: '32px', padding: '18px', background: 'rgba(0,0,0,0.4)',
                border: '3px solid rgba(255,255,255,0.15)', borderRadius: '4px',
              }}>
                {TYPES.map((t) => {
                  const tc = TYPE_COLORS[t];
                  const isPrimary = typeHighlight?.primary === t;
                  const isSecondary = typeHighlight?.secondary === t;
                  const isSelected = isPrimary || isSecondary;
                  const onClick = () => {
                    if (mode === 'defensive' || mode === 'offensive') handleTypeClickStandalone(t);
                    else if (mode === 'team' && teamSubMode === 'analysis') handleTypeClickAnalysis(t);
                    else if (mode === 'team' && teamSubMode === 'counter') handleTypeClickCounter(t);
                  };
                  return (
                    <button key={t} className="type-btn" onClick={onClick} style={{
                      position: 'relative', background: tc.bg, color: tc.text,
                      fontFamily: '"Press Start 2P", monospace', fontSize: '10px',
                      padding: '12px 6px', border: 'none', borderRadius: '2px', cursor: 'pointer',
                      letterSpacing: '0.5px', textTransform: 'uppercase',
                      boxShadow: isSelected ? `0 0 0 3px #fff, 0 0 0 5px ${tc.text}, 0 0 22px ${tc.glow}` : `0 0 0 2px ${tc.text}, 4px 4px 0 0 ${tc.text}`,
                      transform: isSelected ? 'translate(-1px, -1px)' : 'none',
                    }}>
                      {isPrimary && <span style={{ position: 'absolute', top: '2px', right: '4px', fontSize: '8px', color: tc.text, opacity: 0.7 }}>1</span>}
                      {isSecondary && <span style={{ position: 'absolute', top: '2px', right: '4px', fontSize: '8px', color: tc.text, opacity: 0.7 }}>2</span>}
                      {t}
                    </button>
                  );
                })}
              </div>
            )}

            {/* DEFENSIVE / OFFENSIVE selection banner */}
            {mode !== 'team' && (
              <div style={{
                textAlign: 'center', marginBottom: '28px', padding: '20px',
                background: `linear-gradient(135deg, ${c.bg}40 0%, ${c.bg}10 100%)`,
                border: `3px solid ${c.bg}`, borderRadius: '4px',
              }}>
                <div style={{ fontFamily: '"VT323", monospace', fontSize: '20px', color: '#fff', opacity: 0.7, marginBottom: '12px', letterSpacing: '2px' }}>
                  {mode === 'defensive' ? 'DEFENDING TYPE' : 'ATTACKING TYPE'}
                </div>
                <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '10px', flexWrap: 'wrap' }}>
                  <TypeBadge type={type1} size="lg" />
                  {mode === 'defensive' && type2 && (<>
                    <span style={{ fontFamily: '"Press Start 2P", monospace', color: '#fff', fontSize: '14px' }}>/</span>
                    <TypeBadge type={type2} size="lg" />
                  </>)}
                </div>
              </div>
            )}

            {/* RESULTS */}
            {mode === 'defensive' && (
              <div style={panelStyle(c)}>
                <PanelTag c={c} label="🛡 DAMAGE TAKEN" />
                <div style={panelDescStyle()}>
                  When attacked, <strong style={{ color: c.glow }}>{type1}{type2 ? `/${type2}` : ''}</strong> takes:
                </div>
                <Section title="QUAD WEAK" sublabel="(4× damage)" types={defensiveBuckets[4]} accent="#FF3D3D" />
                <Section title="WEAK" sublabel="(2× damage)" types={defensiveBuckets[2]} accent="#FF8F5D" />
                <Section title="NEUTRAL" sublabel="(1× damage)" types={defensiveBuckets[1]} accent="#CCCCCC" />
                <Section title="RESISTS" sublabel="(½× damage)" types={defensiveBuckets[0.5]} accent="#9DFF9D" />
                <Section title="DOUBLE RESIST" sublabel="(¼× damage)" types={defensiveBuckets[0.25]} accent="#5DFF8F" />
                <Section title="IMMUNE" sublabel="(0× damage)" types={defensiveBuckets[0]} accent="#5DCFFF" />
              </div>
            )}

            {mode === 'offensive' && (
              <div style={panelStyle(c)}>
                <PanelTag c={c} label="⚔ DAMAGE DEALT" />
                <div style={panelDescStyle()}>
                  When <strong style={{ color: c.glow }}>{type1}</strong> moves attack these types:
                </div>
                <Section title="SUPER EFFECTIVE" sublabel="(2× damage)" types={offensiveBuckets[2]} accent="#5DFF8F" />
                <Section title="NEUTRAL" sublabel="(1× damage)" types={offensiveBuckets[1]} accent="#CCCCCC" />
                <Section title="NOT VERY EFFECTIVE" sublabel="(½× damage)" types={offensiveBuckets[0.5]} accent="#FF8F5D" />
                <Section title="NO EFFECT" sublabel="(0× damage)" types={offensiveBuckets[0]} accent="#FF5D5D" />
              </div>
            )}

            {mode === 'team' && teamSubMode === 'analysis' && yourTeamSize > 0 && (<>
              <TeamResults teamSize={yourTeamSize} sortedThreats={sortedThreats} accentColor={c} />
              {showRecos && recommendations && <RecommendationsPanel team={yourTeam} recommendations={recommendations} accentColor={c} />}
            </>)}
          </div>
        </div>
      );
    }

    // ============ HEADER ============
    function Header({ c }) {
      return (
        <div style={{ textAlign: 'center', marginBottom: '28px' }}>
          <div style={{ fontFamily: '"VT323", monospace', fontSize: '18px', color: c.glow, letterSpacing: '4px', marginBottom: '4px', transition: 'color 0.4s' }}>
            ◆ TYPE MATCHUP DATABASE ◆
          </div>
          <h1 style={{
            fontFamily: '"Press Start 2P", monospace', fontSize: 'clamp(18px, 4vw, 28px)',
            color: '#fff', margin: 0, letterSpacing: '2px',
            textShadow: `4px 4px 0 ${c.bg}, 8px 8px 0 rgba(0,0,0,0.4)`,
            transition: 'text-shadow 0.4s',
          }}>POKéDEX MATCHUP</h1>
        </div>
      );
    }

    // ============ ANALYSIS VIEW ============
    function AnalysisView({ yourTeam, setYourTeam, editingSlot, setEditingSlot, showRecos, setShowRecos, yourTeamSize, accentColor }) {
      const clearSlot = (idx) => { const nt = [...yourTeam]; nt[idx] = null; setYourTeam(nt); };
      const clearTeam = () => { setYourTeam([null, null, null, null, null, null]); setEditingSlot(0); setShowRecos(false); };

      return (
        <>
          <div style={{ textAlign: 'center', fontFamily: '"VT323", monospace', fontSize: '20px', color: '#bbb', marginBottom: '14px', padding: '0 10px' }}>
            Tap a slot to edit, then tap types below
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '10px', marginBottom: '20px' }}>
            {yourTeam.map((slot, idx) => (
              <SlotCard key={idx} slot={slot} idx={idx} isEditing={editingSlot === idx} onClick={() => setEditingSlot(idx)} onClear={() => clearSlot(idx)} accentColor={accentColor} />
            ))}
          </div>
          {yourTeamSize > 0 && (
            <div style={{ textAlign: 'center', marginBottom: '20px', display: 'flex', gap: '10px', justifyContent: 'center', flexWrap: 'wrap' }}>
              <button onClick={() => setShowRecos(!showRecos)} style={{
                background: showRecos ? accentColor.bg : 'transparent', color: showRecos ? accentColor.text : accentColor.glow,
                border: `2px solid ${accentColor.bg}`, borderRadius: '2px', padding: '10px 18px',
                fontFamily: '"Press Start 2P", monospace', fontSize: '10px', cursor: 'pointer', letterSpacing: '1px',
                boxShadow: showRecos ? `0 0 15px ${accentColor.glow}80` : 'none',
              }}>{showRecos ? '✓ RECOMMENDATIONS ON' : '★ GET RECOMMENDATIONS'}</button>
              <button onClick={clearTeam} style={{
                background: 'transparent', color: '#aaa', border: '2px solid #555',
                borderRadius: '2px', padding: '10px 18px', fontFamily: '"Press Start 2P", monospace',
                fontSize: '10px', cursor: 'pointer', letterSpacing: '1px',
              }}>✕ CLEAR TEAM</button>
            </div>
          )}
          {yourTeamSize === 0 && (
            <div style={{ background: 'rgba(0,0,0,0.55)', border: '3px dashed rgba(255,255,255,0.15)', borderRadius: '4px', padding: '40px 24px', textAlign: 'center' }}>
              <div style={{ fontFamily: '"VT323", monospace', fontSize: '24px', color: '#888', letterSpacing: '2px' }}>▼ Add Pokémon to your team to see analysis ▼</div>
            </div>
          )}
        </>
      );
    }

    function SlotCard({ slot, idx, isEditing, onClick, onClear, accentColor }) {
      const slotColor = slot ? TYPE_COLORS[slot.type1] : null;
      return (
        <div className="slot-card" onClick={onClick} style={{
          background: slot ? `linear-gradient(135deg, ${slotColor.bg}50 0%, ${slotColor.bg}15 100%)` : 'rgba(0,0,0,0.4)',
          border: isEditing ? `3px solid ${accentColor.glow}` : slot ? `3px solid ${slotColor.bg}` : '3px dashed rgba(255,255,255,0.2)',
          borderRadius: '4px', padding: '14px 12px', cursor: 'pointer',
          minHeight: '110px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
          boxShadow: isEditing ? `0 0 20px ${accentColor.glow}80` : 'none', position: 'relative',
        }}>
          <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '9px', color: isEditing ? accentColor.glow : '#888', letterSpacing: '1px', marginBottom: '8px' }}>
            SLOT {idx + 1}{isEditing ? ' ◀' : ''}
          </div>
          {slot ? (<>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '6px', alignItems: 'flex-start' }}>
              <TypeBadge type={slot.type1} size="xs" />
              {slot.type2 && <TypeBadge type={slot.type2} size="xs" />}
            </div>
            <button onClick={(e) => { e.stopPropagation(); onClear(); }} style={{
              position: 'absolute', top: '6px', right: '6px',
              background: 'rgba(0,0,0,0.5)', color: '#fff', border: '1px solid rgba(255,255,255,0.2)',
              borderRadius: '2px', width: '20px', height: '20px', fontSize: '10px', cursor: 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 0,
            }}>✕</button>
          </>) : (
            <div style={{ fontFamily: '"VT323", monospace', fontSize: '18px', color: '#666', fontStyle: 'italic' }}>empty</div>
          )}
        </div>
      );
    }

    // ============ COUNTER VIEW ============
    function CounterView({ yourTeam, setYourTeam, enemyTeam, setEnemyTeam, activeTeamSide, setActiveTeamSide, editingSlot, setEditingSlot, editTarget, setEditTarget, locked, setLocked, selectedEnemyIdx, setSelectedEnemyIdx, accentColor }) {
      const yourSize = yourTeam.filter(Boolean).length;
      const enemySize = enemyTeam.filter(Boolean).length;
      const canLock = yourSize > 0 && enemySize > 0;

      const clearYour = () => { setYourTeam([null, null, null, null, null, null]); setEditingSlot(0); setEditTarget('type'); };
      const clearEnemy = () => { setEnemyTeam([null, null, null, null, null, null]); setEditingSlot(0); setEditTarget('type'); };

      if (locked) {
        return (
          <LockedView
            yourTeam={yourTeam} enemyTeam={enemyTeam}
            selectedEnemyIdx={selectedEnemyIdx} setSelectedEnemyIdx={setSelectedEnemyIdx}
            unlock={() => { setLocked(false); setSelectedEnemyIdx(null); }}
            accentColor={accentColor}
          />
        );
      }

      // Editing view (unlocked)
      const team = activeTeamSide === 'your' ? yourTeam : enemyTeam;
      const setTeam = activeTeamSide === 'your' ? setYourTeam : setEnemyTeam;
      const setEditingSlotForSide = (idx) => {
        setEditingSlot(idx);
        setEditTarget('type');
      };

      return (
        <>
          {/* Side toggle */}
          <div style={{ display: 'flex', gap: '6px', justifyContent: 'center', marginBottom: '18px', flexWrap: 'wrap' }}>
            {[{ id: 'your', label: '👥 YOUR TEAM', count: yourSize }, { id: 'enemy', label: '⚔ ENEMY TEAM', count: enemySize }].map((s) => {
              const active = activeTeamSide === s.id;
              return (
                <button key={s.id} onClick={() => { setActiveTeamSide(s.id); setEditingSlot(0); setEditTarget('type'); }} style={{
                  background: active ? `${accentColor.bg}40` : 'transparent', color: active ? accentColor.glow : '#888',
                  fontFamily: '"Press Start 2P", monospace', fontSize: '10px',
                  padding: '10px 16px', border: active ? `2px solid ${accentColor.bg}` : '2px solid rgba(255,255,255,0.1)',
                  borderRadius: '2px', cursor: 'pointer', letterSpacing: '1px',
                }}>{s.label} ({s.count}/6)</button>
              );
            })}
          </div>

          <div style={{ textAlign: 'center', fontFamily: '"VT323", monospace', fontSize: '18px', color: '#bbb', marginBottom: '14px' }}>
            Editing <strong style={{ color: accentColor.glow }}>{activeTeamSide === 'your' ? 'your team' : "the enemy team"}</strong>. Tap a slot, then choose typing or move slots below.
          </div>

          {/* Slot grid for active team */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: '10px', marginBottom: '16px' }}>
            {team.map((slot, idx) => (
              <DetailedSlotCard
                key={idx}
                slot={slot}
                idx={idx}
                isEditing={editingSlot === idx}
                editTarget={editTarget}
                setEditTarget={setEditTarget}
                onClickSlot={() => setEditingSlotForSide(idx)}
                onClear={() => { const nt = [...team]; nt[idx] = null; setTeam(nt); }}
                accentColor={accentColor}
              />
            ))}
          </div>

          {/* Action buttons */}
          <div style={{ textAlign: 'center', marginBottom: '20px', display: 'flex', gap: '10px', justifyContent: 'center', flexWrap: 'wrap' }}>
            <button onClick={() => activeTeamSide === 'your' ? clearYour() : clearEnemy()} style={{
              background: 'transparent', color: '#aaa', border: '2px solid #555',
              borderRadius: '2px', padding: '8px 14px', fontFamily: '"Press Start 2P", monospace',
              fontSize: '9px', cursor: 'pointer', letterSpacing: '1px',
            }}>✕ CLEAR {activeTeamSide === 'your' ? 'YOUR TEAM' : 'ENEMY TEAM'}</button>

            <button
              disabled={!canLock}
              onClick={() => { if (canLock) { setLocked(true); setSelectedEnemyIdx(null); } }}
              style={{
                background: canLock ? accentColor.bg : 'rgba(50,50,50,0.5)',
                color: canLock ? accentColor.text : '#555',
                border: 'none', borderRadius: '2px', padding: '12px 20px',
                fontFamily: '"Press Start 2P", monospace', fontSize: '11px',
                cursor: canLock ? 'pointer' : 'not-allowed', letterSpacing: '1px',
                boxShadow: canLock ? `0 0 0 3px #fff, 0 0 0 5px ${accentColor.text}, 0 0 25px ${accentColor.glow}` : 'none',
              }}
            >🔒 LOCK & ANALYSE</button>
          </div>

          {!canLock && (
            <div style={{ textAlign: 'center', fontFamily: '"VT323", monospace', fontSize: '16px', color: '#888', marginBottom: '18px' }}>
              Add at least one Pokémon to both teams to lock
            </div>
          )}
        </>
      );
    }

    // ============ DETAILED SLOT CARD (with move slots) ============
    function DetailedSlotCard({ slot, idx, isEditing, editTarget, setEditTarget, onClickSlot, onClear, accentColor }) {
      const slotColor = slot ? TYPE_COLORS[slot.type1] : null;
      const moves = slot?.moves || [null, null, null, null];

      return (
        <div className="slot-card" style={{
          background: slot ? `linear-gradient(135deg, ${slotColor.bg}40 0%, ${slotColor.bg}10 100%)` : 'rgba(0,0,0,0.4)',
          border: isEditing ? `3px solid ${accentColor.glow}` : slot ? `3px solid ${slotColor.bg}` : '3px dashed rgba(255,255,255,0.2)',
          borderRadius: '4px', padding: '12px', position: 'relative',
          boxShadow: isEditing ? `0 0 20px ${accentColor.glow}40` : 'none',
        }}>
          <div onClick={onClickSlot} style={{ cursor: 'pointer' }}>
            <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '9px', color: isEditing ? accentColor.glow : '#888', letterSpacing: '1px', marginBottom: '8px' }}>
              SLOT {idx + 1}{isEditing ? ' ◀' : ''}
            </div>
          </div>

          {/* Type row */}
          <div
            onClick={() => { onClickSlot(); setEditTarget('type'); }}
            style={{
              padding: '6px 8px', marginBottom: '8px',
              background: isEditing && editTarget === 'type' ? `${accentColor.bg}30` : 'rgba(0,0,0,0.3)',
              border: isEditing && editTarget === 'type' ? `1px solid ${accentColor.glow}` : '1px solid rgba(255,255,255,0.1)',
              borderRadius: '2px', cursor: 'pointer', minHeight: '32px',
              display: 'flex', alignItems: 'center', gap: '6px', flexWrap: 'wrap',
            }}
          >
            <span style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '7px', color: '#888', letterSpacing: '1px' }}>TYPE:</span>
            {slot ? (<>
              <TypeBadge type={slot.type1} size="xs" />
              {slot.type2 && <TypeBadge type={slot.type2} size="xs" />}
            </>) : (
              <span style={{ fontFamily: '"VT323", monospace', fontSize: '14px', color: '#666', fontStyle: 'italic' }}>tap to set typing</span>
            )}
          </div>

          {/* Move rows (only shown if slot has typing) */}
          {slot && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
              {[0, 1, 2, 3].map((mi) => {
                const move = moves[mi];
                const isThisMoveEditing = isEditing && editTarget === `move${mi}`;
                const moveColor = move ? TYPE_COLORS[move] : null;
                return (
                  <div
                    key={mi}
                    onClick={() => { onClickSlot(); setEditTarget(`move${mi}`); }}
                    style={{
                      padding: '4px 8px',
                      background: move ? `${moveColor.bg}20` : isThisMoveEditing ? `${accentColor.bg}25` : 'rgba(0,0,0,0.3)',
                      border: isThisMoveEditing ? `1px solid ${accentColor.glow}` : move ? `1px solid ${moveColor.bg}` : '1px solid rgba(255,255,255,0.05)',
                      borderRadius: '2px', cursor: 'pointer', minHeight: '26px',
                      display: 'flex', alignItems: 'center', gap: '6px',
                    }}
                  >
                    <span style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '7px', color: '#888', letterSpacing: '1px' }}>M{mi + 1}:</span>
                    {move ? <TypeBadge type={move} size="xs" /> : <span style={{ fontFamily: '"VT323", monospace', fontSize: '13px', color: '#555', fontStyle: 'italic' }}>—</span>}
                    {isThisMoveEditing && <span style={{ marginLeft: 'auto', fontFamily: '"VT323", monospace', fontSize: '13px', color: accentColor.glow }}>◀</span>}
                  </div>
                );
              })}
            </div>
          )}

          {slot && (
            <button onClick={(e) => { e.stopPropagation(); onClear(); }} style={{
              position: 'absolute', top: '6px', right: '6px',
              background: 'rgba(0,0,0,0.5)', color: '#fff', border: '1px solid rgba(255,255,255,0.2)',
              borderRadius: '2px', width: '20px', height: '20px', fontSize: '10px', cursor: 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 0,
            }}>✕</button>
          )}
        </div>
      );
    }

    // ============ LOCKED VIEW ============
    function LockedView({ yourTeam, enemyTeam, selectedEnemyIdx, setSelectedEnemyIdx, unlock, accentColor }) {
      const filledEnemy = enemyTeam.filter(Boolean);
      const filledYour = yourTeam.filter(Boolean);

      // Default: select first enemy if none selected
      const effectiveIdx = selectedEnemyIdx !== null ? selectedEnemyIdx : 0;
      const selectedEnemy = enemyTeam[effectiveIdx] && enemyTeam[effectiveIdx];

      const yourRanking = useMemo(() => {
        if (!selectedEnemy) return [];
        return rankYourTeamVsEnemy(yourTeam, selectedEnemy);
      }, [yourTeam, selectedEnemy]);

      const enemyRanking = useMemo(() => {
        if (!selectedEnemy) return [];
        // Find which of OUR team is the "anchor" — pick the highest-scoring one from yourRanking
        const top = yourRanking[0];
        if (!top) return [];
        return rankEnemyVsYourMon(enemyTeam, top.member);
      }, [enemyTeam, yourRanking]);

      // Top 3 theoretical type combos against the entire enemy team
      const theoreticalCounters = useMemo(() => {
        return findBestTheoreticalCounters(enemyTeam, 3);
      }, [enemyTeam]);

      return (
        <>
          <div style={{ textAlign: 'center', marginBottom: '14px', display: 'flex', gap: '10px', justifyContent: 'center', flexWrap: 'wrap' }}>
            <button onClick={unlock} style={{
              background: 'transparent', color: accentColor.glow, border: `2px solid ${accentColor.bg}`,
              borderRadius: '2px', padding: '10px 16px',
              fontFamily: '"Press Start 2P", monospace', fontSize: '10px', cursor: 'pointer', letterSpacing: '1px',
            }}>🔓 UNLOCK & EDIT</button>
          </div>

          <div style={{ textAlign: 'center', fontFamily: '"VT323", monospace', fontSize: '20px', color: '#bbb', marginBottom: '14px' }}>
            Tap an enemy Pokémon below to see matchups
          </div>

          {/* Enemy team row - clickable */}
          <div style={{
            background: 'rgba(0,0,0,0.4)', border: '2px solid rgba(255,80,80,0.3)',
            borderRadius: '4px', padding: '14px', marginBottom: '20px',
          }}>
            <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '10px', color: '#FF8F5D', marginBottom: '10px', letterSpacing: '1px' }}>
              ⚔ ENEMY TEAM ({filledEnemy.length}/6)
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(120px, 1fr))', gap: '8px' }}>
              {enemyTeam.map((slot, idx) => {
                if (!slot) return null;
                const isSelected = effectiveIdx === idx;
                const slotColor = TYPE_COLORS[slot.type1];
                return (
                  <div
                    key={idx}
                    onClick={() => setSelectedEnemyIdx(idx)}
                    className="slot-card"
                    style={{
                      background: isSelected ? `linear-gradient(135deg, ${slotColor.bg}50 0%, ${slotColor.bg}15 100%)` : 'rgba(0,0,0,0.3)',
                      border: isSelected ? `2px solid ${slotColor.glow}` : `2px solid ${slotColor.bg}80`,
                      borderRadius: '2px', padding: '10px', cursor: 'pointer',
                      boxShadow: isSelected ? `0 0 15px ${slotColor.glow}60` : 'none',
                    }}
                  >
                    <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '8px', color: isSelected ? slotColor.glow : '#888', marginBottom: '6px', letterSpacing: '1px' }}>
                      SLOT {idx + 1}{isSelected ? ' ◀' : ''}
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                      <ComboBadges combo={slot} size="xs" />
                      {slot.moves && slot.moves.filter(Boolean).length > 0 && (
                        <div style={{ display: 'flex', gap: '3px', flexWrap: 'wrap', marginTop: '4px' }}>
                          {slot.moves.filter(Boolean).map((m, i) => <TypeBadge key={i} type={m} size="xs" />)}
                        </div>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {selectedEnemy && (
            <MatchupResults
              enemy={selectedEnemy}
              yourRanking={yourRanking}
              enemyRanking={enemyRanking}
              accentColor={accentColor}
            />
          )}

          {theoreticalCounters.length > 0 && (
            <TheoreticalCountersPanel
              counters={theoreticalCounters}
              enemyCount={filledEnemy.length}
              accentColor={accentColor}
            />
          )}
        </>
      );
    }

    // ============ MATCHUP RESULTS (side by side) ============
    function MatchupResults({ enemy, yourRanking, enemyRanking, accentColor }) {
      const enemyColor = TYPE_COLORS[enemy.type1];
      return (
        <div style={panelStyle(enemyColor)}>
          <PanelTag c={enemyColor} label="🎯 MATCHUP" />
          <div style={{ ...panelDescStyle(), marginBottom: '20px' }}>
            Selected enemy: <ComboBadges combo={enemy} size="xs" />
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(320px, 1fr))', gap: '20px' }}>
            {/* YOUR TEAM vs THIS ENEMY */}
            <div>
              <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '11px', color: '#5DFF8F', marginBottom: '12px', letterSpacing: '1px' }}>
                ▸ YOUR TEAM vs THIS ENEMY
                <div style={{ fontFamily: '"VT323", monospace', fontSize: '14px', color: '#999', marginTop: '4px', letterSpacing: 0, fontWeight: 'normal' }}>
                  who counters them best
                </div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                {yourRanking.map((m, i) => <MatchupRow key={m.slotIdx} matchup={m} rank={i + 1} highlightBest={i === 0} />)}
              </div>
            </div>

            {/* ENEMY TEAM threats vs your best counter */}
            <div>
              <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '11px', color: '#FF8F5D', marginBottom: '12px', letterSpacing: '1px' }}>
                ▸ ENEMY THREATS
                <div style={{ fontFamily: '"VT323", monospace', fontSize: '14px', color: '#999', marginTop: '4px', letterSpacing: 0, fontWeight: 'normal' }}>
                  vs your best counter ({yourRanking[0] ? `slot ${yourRanking[0].slotIdx + 1}` : '—'})
                </div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                {enemyRanking.map((m, i) => <MatchupRow key={m.slotIdx} matchup={m} rank={i + 1} highlightBest={i === 0} dangerous />)}
              </div>
            </div>
          </div>

          <div style={{
            marginTop: '20px', padding: '12px', background: 'rgba(0,0,0,0.3)',
            borderLeft: '3px solid #555', borderRadius: '2px',
            fontFamily: '"VT323", monospace', fontSize: '15px', color: '#999', lineHeight: 1.4,
          }}>
            <strong style={{ color: '#bbb' }}>Scoring:</strong> Defense (D) rewards resisting opponent moves (immune +3, ½× +1, 2× −2, 4× −4). Offense (O) rewards your best move hitting hard (super effective +2, neutral 0, resisted −1, no effect −4). If a Pokémon has no moves set, falls back to STAB. Pure type theory — abilities, items, stats, accuracy not included.
          </div>
        </div>
      );
    }

    function TheoreticalCountersPanel({ counters, enemyCount, accentColor }) {
      return (
        <div style={{ ...panelStyle(accentColor), marginTop: '24px' }}>
          <PanelTag c={accentColor} label="★ THEORETICAL TOP 3" />
          <div style={{ ...panelDescStyle(), marginBottom: '20px' }}>
            Best type combos against this enemy team — useful if you want to swap in a fresh Pokémon.
            <span style={{ color: '#888', fontSize: '15px', display: 'block', marginTop: '4px' }}>
              Scored across all {enemyCount} enemy{enemyCount === 1 ? '' : 's'} (STAB only — no specific moveset assumed)
            </span>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
            {counters.map((entry, i) => (
              <TheoreticalCounterRow key={i} entry={entry} rank={i + 1} />
            ))}
          </div>
          <div style={{
            marginTop: '20px', padding: '12px', background: 'rgba(0,0,0,0.3)',
            borderLeft: '3px solid #555', borderRadius: '2px',
            fontFamily: '"VT323", monospace', fontSize: '15px', color: '#999', lineHeight: 1.4,
          }}>
            <strong style={{ color: '#bbb' }}>Note:</strong> These are pure type-theory recommendations — no specific Pokémon, just the typing combo that would handle the team best. Use it as a hint for what kind of mon to add or swap in.
          </div>
        </div>
      );
    }

    function TheoreticalCounterRow({ entry, rank }) {
      const c = TYPE_COLORS[entry.combo.type1];
      const totalColor = entry.totalScore > 0 ? '#5DFF8F' : entry.totalScore < 0 ? '#FF8F5D' : '#bbb';
      return (
        <div className="reco-card" style={{
          padding: '12px 14px',
          background: rank === 1 ? `linear-gradient(135deg, ${c.bg}40 0%, ${c.bg}10 100%)` : `${c.bg}15`,
          borderLeft: rank === 1 ? `4px solid ${c.glow}` : `4px solid ${c.bg}`,
          borderRadius: '2px',
          boxShadow: rank === 1 ? `0 0 12px ${c.bg}40` : 'none',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '14px', flexWrap: 'wrap' }}>
            <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '14px', color: rank === 1 ? c.glow : '#888', minWidth: '24px', textAlign: 'center' }}>
              {rank === 1 ? '★' : `#${rank}`}
            </div>
            <div><ComboBadges combo={entry.combo} size="sm" /></div>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: '14px', fontFamily: '"VT323", monospace', fontSize: '16px', flexWrap: 'wrap', alignItems: 'center' }}>
              <span style={{ color: '#888' }}>avg: <span style={{ color: totalColor }}>{entry.avgScore > 0 ? '+' : ''}{entry.avgScore.toFixed(1)}</span></span>
              <span style={{ color: '#fff' }}>total {entry.totalScore > 0 ? '+' : ''}{entry.totalScore}</span>
            </div>
          </div>
          {entry.bestVs && entry.worstVs && (
            <div style={{ marginTop: '8px', fontFamily: '"VT323", monospace', fontSize: '14px', color: '#888', display: 'flex', gap: '14px', flexWrap: 'wrap' }}>
              <span>best vs: <span style={{ color: '#5DFF8F' }}>
                {entry.bestVs.type1}{entry.bestVs.type2 ? `/${entry.bestVs.type2}` : ''}
              </span> (+{entry.bestVsScore})</span>
              <span>worst vs: <span style={{ color: '#FF8F5D' }}>
                {entry.worstVs.type1}{entry.worstVs.type2 ? `/${entry.worstVs.type2}` : ''}
              </span> ({entry.worstVsScore > 0 ? '+' : ''}{entry.worstVsScore})</span>
            </div>
          )}
        </div>
      );
    }

    function MatchupRow({ matchup, rank, highlightBest, dangerous }) {
      const c = TYPE_COLORS[matchup.member.type1];
      const total = matchup.totalScore;
      const goodColor = dangerous ? '#FF8F5D' : '#5DFF8F';
      const badColor = dangerous ? '#5DFF8F' : '#FF8F5D';

      return (
        <div className="reco-card" style={{
          padding: '10px 12px',
          background: highlightBest ? `linear-gradient(135deg, ${c.bg}40 0%, ${c.bg}10 100%)` : `${c.bg}10`,
          borderLeft: highlightBest ? `4px solid ${c.glow}` : `3px solid ${c.bg}`,
          borderRadius: '2px',
          boxShadow: highlightBest ? `0 0 12px ${c.bg}40` : 'none',
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flexWrap: 'wrap' }}>
            <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '10px', color: highlightBest ? c.glow : '#888', minWidth: '24px' }}>
              {highlightBest ? '★' : `#${rank}`}
            </div>
            <div style={{ minWidth: '90px' }}>
              <ComboBadges combo={matchup.member} size="xs" />
            </div>
            <div style={{ marginLeft: 'auto', display: 'flex', gap: '8px', fontFamily: '"VT323", monospace', fontSize: '15px', flexWrap: 'wrap' }}>
              <span>D<span style={{ color: matchup.defenseScore > 0 ? goodColor : matchup.defenseScore < 0 ? badColor : '#bbb' }}>{matchup.defenseScore > 0 ? '+' : ''}{matchup.defenseScore}</span></span>
              <span>O<span style={{ color: matchup.offenseScore > 0 ? goodColor : matchup.offenseScore < 0 ? badColor : '#bbb' }}>{matchup.offenseScore > 0 ? '+' : ''}{matchup.offenseScore}</span></span>
              <span style={{ color: '#fff' }}>= {total > 0 ? '+' : ''}{total}</span>
            </div>
          </div>
          {matchup.moves && matchup.bestMove && (
            <div style={{ marginTop: '6px', fontFamily: '"VT323", monospace', fontSize: '13px', color: '#888' }}>
              best move: <span style={{ color: multColor(matchup.bestMoveMult) }}>{matchup.bestMove} → {multLabel(matchup.bestMoveMult)}</span>
              {!matchup.usingMoveset && <span style={{ color: '#555', fontStyle: 'italic' }}> (STAB fallback — no moves set)</span>}
            </div>
          )}
        </div>
      );
    }

    // ============ TEAM ANALYSIS RESULTS ============
    function TeamResults({ teamSize, sortedThreats, accentColor }) {
      if (teamSize === 0) return null;
      const criticalThreats = sortedThreats.filter(t => t.score > 0 && (t.weak + t.quadWeak) > t.total / 2);
      const majorThreats = sortedThreats.filter(t => t.score > 0 && !criticalThreats.includes(t));
      const safe = sortedThreats.filter(t => t.score <= 0).reverse();
      return (
        <div style={panelStyle(accentColor)}>
          <PanelTag c={accentColor} label={`👥 TEAM ANALYSIS (${teamSize}/6)`} />
          <div style={{ ...panelDescStyle(), marginBottom: '24px' }}>
            Attacking types ranked by threat to your team. Numbers show: <span style={{ color: '#FF3D3D' }}>quad-weak</span> / <span style={{ color: '#FF8F5D' }}>weak</span> / <span style={{ color: '#9DFF9D' }}>resist</span> / <span style={{ color: '#5DCFFF' }}>immune</span>
          </div>
          {criticalThreats.length > 0 && <ThreatGroup title="CRITICAL THREATS" sublabel="(half your team weak or worse)" accent="#FF3D3D" threats={criticalThreats} />}
          {majorThreats.length > 0 && <ThreatGroup title="THREATS" sublabel="(net dangerous to team)" accent="#FF8F5D" threats={majorThreats} />}
          {safe.length > 0 && <ThreatGroup title="SAFE / RESISTED" sublabel="(team handles well)" accent="#5DFF8F" threats={safe} />}
        </div>
      );
    }

    function ThreatGroup({ title, sublabel, accent, threats }) {
      return (
        <div style={{ marginBottom: '24px' }}>
          <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '10px', color: accent, marginBottom: '12px', letterSpacing: '1px', textShadow: `2px 2px 0 rgba(0,0,0,0.3)` }}>
            ▸ {title}
            {sublabel && <span style={{ fontFamily: '"VT323", monospace', fontSize: '15px', color: '#999', marginLeft: '8px', letterSpacing: 0 }}>{sublabel}</span>}
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
            {threats.map(t => <ThreatRow key={t.type} threat={t} />)}
          </div>
        </div>
      );
    }

    function ThreatRow({ threat }) {
      const c = TYPE_COLORS[threat.type];
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '8px 12px', background: `${c.bg}15`, borderLeft: `4px solid ${c.bg}`, borderRadius: '2px' }}>
          <div style={{ minWidth: '90px' }}><TypeBadge type={threat.type} size="xs" /></div>
          <div style={{ display: 'flex', gap: '10px', fontFamily: '"VT323", monospace', fontSize: '18px', flexWrap: 'wrap' }}>
            {threat.quadWeak > 0 && <span style={{ color: '#FF3D3D' }}>4×: {threat.quadWeak}</span>}
            {threat.weak > 0 && <span style={{ color: '#FF8F5D' }}>2×: {threat.weak}</span>}
            {threat.neutral > 0 && <span style={{ color: '#999' }}>1×: {threat.neutral}</span>}
            {threat.resist > 0 && <span style={{ color: '#9DFF9D' }}>½×: {threat.resist}</span>}
            {threat.doubleResist > 0 && <span style={{ color: '#5DFF8F' }}>¼×: {threat.doubleResist}</span>}
            {threat.immune > 0 && <span style={{ color: '#5DCFFF' }}>0×: {threat.immune}</span>}
          </div>
        </div>
      );
    }

    function RecommendationsPanel({ team, recommendations, accentColor }) {
      const { additions, swaps } = recommendations;
      const hasEmptySlot = team.some(s => s === null);
      return (
        <div style={{ ...panelStyle(accentColor), marginTop: '24px' }}>
          <PanelTag c={accentColor} label="★ RECOMMENDATIONS" />
          <div style={{ ...panelDescStyle(), marginBottom: '20px' }}>
            Current team threat score: <strong style={{ color: '#FF8F5D' }}>{additions.baseline}</strong>
            <span style={{ color: '#888', fontSize: '15px' }}> (lower is better)</span>
          </div>
          <div style={{ marginBottom: '28px' }}>
            <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '11px', color: '#5DFF8F', marginBottom: '12px', letterSpacing: '1px' }}>
              ▸ {hasEmptySlot ? 'BEST TYPES TO ADD' : 'BEST TYPES TO BRING (TEAM IS FULL)'}
              <span style={{ fontFamily: '"VT323", monospace', fontSize: '15px', color: '#999', marginLeft: '8px', letterSpacing: 0 }}>top 5 by team improvement</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
              {additions.results.map((r, i) => <RecoRow key={i} rank={i + 1} combo={r.combo} improvement={r.improvement} newScore={r.newScore} />)}
            </div>
          </div>
          {swaps && swaps.swaps.length > 0 && (
            <div>
              <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '11px', color: '#FFB85D', marginBottom: '12px', letterSpacing: '1px' }}>
                ▸ BEST SWAPS<span style={{ fontFamily: '"VT323", monospace', fontSize: '15px', color: '#999', marginLeft: '8px', letterSpacing: 0 }}>drop X, replace with Y</span>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                {swaps.swaps.filter(s => s.improvement > 0).slice(0, 5).map((s) => <SwapRow key={s.slotIdx} swap={s} />)}
                {swaps.swaps.filter(s => s.improvement > 0).length === 0 && (
                  <div style={{ fontFamily: '"VT323", monospace', fontSize: '18px', color: '#5DFF8F', fontStyle: 'italic', paddingLeft: '8px' }}>Your team is well-balanced — no swap improves the score!</div>
                )}
              </div>
            </div>
          )}
          <div style={{ marginTop: '24px', padding: '12px', background: 'rgba(0,0,0,0.3)', borderLeft: '3px solid #555', borderRadius: '2px', fontFamily: '"VT323", monospace', fontSize: '16px', color: '#999', lineHeight: 1.4 }}>
            <strong style={{ color: '#bbb' }}>How this works:</strong> threat score sums up team weaknesses (4× = 4pts, 2× = 2pts) minus resistances (½× = -1, ¼× = -2, immune = -3). Tests all 153 type combos and ranks by score reduction. Pure type theory — no stats, abilities, or movesets.
          </div>
        </div>
      );
    }

    function RecoRow({ rank, combo, improvement, newScore }) {
      const c = TYPE_COLORS[combo.type1];
      return (
        <div className="reco-card" style={{
          display: 'flex', alignItems: 'center', gap: '14px',
          padding: '12px 14px', background: `${c.bg}15`, borderLeft: `4px solid ${c.bg}`, borderRadius: '2px',
        }}>
          <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '14px', color: c.glow, minWidth: '24px', textAlign: 'center' }}>{rank}</div>
          <div style={{ flex: 1 }}><ComboBadges combo={combo} size="sm" /></div>
          <div style={{ fontFamily: '"VT323", monospace', fontSize: '18px', textAlign: 'right' }}>
            {improvement > 0 ? <span style={{ color: '#5DFF8F' }}>−{improvement} threat</span> : improvement === 0 ? <span style={{ color: '#999' }}>no change</span> : <span style={{ color: '#FF8F5D' }}>+{Math.abs(improvement)} threat</span>}
            <div style={{ fontSize: '13px', color: '#888' }}>→ {newScore}</div>
          </div>
        </div>
      );
    }

    function SwapRow({ swap }) {
      return (
        <div className="reco-card" style={{ padding: '12px 14px', background: 'rgba(0,0,0,0.3)', border: '2px solid rgba(255,255,255,0.1)', borderRadius: '2px' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flexWrap: 'wrap' }}>
            <div style={{ fontFamily: '"Press Start 2P", monospace', fontSize: '9px', color: '#888', letterSpacing: '1px' }}>SLOT {swap.slotIdx + 1}:</div>
            <div style={{ display: 'flex', alignItems: 'center', gap: '8px', flexWrap: 'wrap' }}>
              <span style={{ opacity: 0.6 }}><ComboBadges combo={swap.original} size="xs" /></span>
              <span style={{ color: '#888', fontFamily: '"Press Start 2P", monospace', fontSize: '12px' }}>→</span>
              <ComboBadges combo={swap.bestReplacement} size="xs" />
            </div>
            <div style={{ marginLeft: 'auto', fontFamily: '"VT323", monospace', fontSize: '17px', color: '#5DFF8F' }}>−{swap.improvement} threat</div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PokemonTypeChart />);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Pokédex Matchup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #0a0a1a; }
    #root { min-height: 100vh; }

    .pkmn-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
      z-index: 1;
    }
    .type-btn { transition: all 0.15s ease; }
    .type-btn:hover { transform: translate(-2px, -2px); }
    .type-btn:active { transform: translate(1px, 1px); }
    .mode-btn { transition: all 0.15s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useMemo } = React;

    const TYPES = [
      'Normal', 'Fire', 'Water', 'Electric', 'Grass', 'Ice',
      'Fighting', 'Poison', 'Ground', 'Flying', 'Psychic', 'Bug',
      'Rock', 'Ghost', 'Dragon', 'Dark', 'Steel', 'Fairy'
    ];

    const TYPE_COLORS = {
      Normal:   { bg: '#A8A77A', text: '#2D2D1F', glow: '#C5C397' },
      Fire:     { bg: '#EE8130', text: '#3A1A05', glow: '#FFA559' },
      Water:    { bg: '#6390F0', text: '#0A1F4D', glow: '#8FB3FF' },
      Electric: { bg: '#F7D02C', text: '#3D3000', glow: '#FFE45C' },
      Grass:    { bg: '#7AC74C', text: '#143300', glow: '#9EE070' },
      Ice:      { bg: '#96D9D6', text: '#0F3D3B', glow: '#BFEDEB' },
      Fighting: { bg: '#C22E28', text: '#FFE5E5', glow: '#E84D47' },
      Poison:   { bg: '#A33EA1', text: '#FFE5FE', glow: '#C760C5' },
      Ground:   { bg: '#E2BF65', text: '#3D2E08', glow: '#F2D689' },
      Flying:   { bg: '#A98FF3', text: '#1A0F4A', glow: '#C7B5FF' },
      Psychic:  { bg: '#F95587', text: '#4A0A24', glow: '#FF7DA6' },
      Bug:      { bg: '#A6B91A', text: '#2A3000', glow: '#C9DD3D' },
      Rock:     { bg: '#B6A136', text: '#332C05', glow: '#D6C155' },
      Ghost:    { bg: '#735797', text: '#E8DFF5', glow: '#9577B8' },
      Dragon:   { bg: '#6F35FC', text: '#E5DBFF', glow: '#9163FF' },
      Dark:     { bg: '#705746', text: '#F0E5DC', glow: '#947463' },
      Steel:    { bg: '#B7B7CE', text: '#1F1F33', glow: '#D4D4E8' },
      Fairy:    { bg: '#D685AD', text: '#3D1428', glow: '#F0A6CC' },
    };

    const CHART = {
      Normal:   { Rock: 0.5, Ghost: 0,   Steel: 0.5 },
      Fire:     { Fire: 0.5, Water: 0.5, Grass: 2,   Ice: 2,    Bug: 2,    Rock: 0.5, Dragon: 0.5, Steel: 2 },
      Water:    { Fire: 2,   Water: 0.5, Grass: 0.5, Ground: 2, Rock: 2,   Dragon: 0.5 },
      Electric: { Water: 2,  Electric: 0.5, Grass: 0.5, Ground: 0, Flying: 2, Dragon: 0.5 },
      Grass:    { Fire: 0.5, Water: 2,   Grass: 0.5, Poison: 0.5, Ground: 2, Flying: 0.5, Bug: 0.5, Rock: 2, Dragon: 0.5, Steel: 0.5 },
      Ice:      { Fire: 0.5, Water: 0.5, Grass: 2,   Ice: 0.5,  Ground: 2, Flying: 2, Dragon: 2, Steel: 0.5 },
      Fighting: { Normal: 2, Ice: 2,     Poison: 0.5, Flying: 0.5, Psychic: 0.5, Bug: 0.5, Rock: 2, Ghost: 0, Dark: 2, Steel: 2, Fairy: 0.5 },
      Poison:   { Grass: 2,  Poison: 0.5, Ground: 0.5, Rock: 0.5, Ghost: 0.5, Steel: 0, Fairy: 2 },
      Ground:   { Fire: 2,   Electric: 2, Grass: 0.5, Poison: 2, Flying: 0, Bug: 0.5, Rock: 2, Steel: 2 },
      Flying:   { Electric: 0.5, Grass: 2, Fighting: 2, Bug: 2, Rock: 0.5, Steel: 0.5 },
      Psychic:  { Fighting: 2, Poison: 2, Psychic: 0.5, Dark: 0, Steel: 0.5 },
      Bug:      { Fire: 0.5, Grass: 2,   Fighting: 0.5, Poison: 0.5, Flying: 0.5, Psychic: 2, Ghost: 0.5, Dark: 2, Steel: 0.5, Fairy: 0.5 },
      Rock:     { Fire: 2,   Ice: 2,     Fighting: 0.5, Ground: 0.5, Flying: 2, Bug: 2, Steel: 0.5 },
      Ghost:    { Normal: 0, Psychic: 2, Ghost: 2,   Dark: 0.5 },
      Dragon:   { Dragon: 2, Steel: 0.5, Fairy: 0 },
      Dark:     { Fighting: 0.5, Psychic: 2, Ghost: 2, Dark: 0.5, Fairy: 0.5 },
      Steel:    { Fire: 0.5, Water: 0.5, Electric: 0.5, Ice: 2, Rock: 2, Steel: 0.5, Fairy: 2 },
      Fairy:    { Fire: 0.5, Fighting: 2, Poison: 0.5, Dragon: 2, Dark: 2, Steel: 0.5 },
    };

    function calcMultiplier(attacker, type1, type2) {
      const m1 = CHART[attacker]?.[type1] ?? 1;
      if (!type2) return m1;
      const m2 = CHART[attacker]?.[type2] ?? 1;
      return m1 * m2;
    }

    function groupByMultiplier(type1, type2) {
      const buckets = { 4: [], 2: [], 1: [], 0.5: [], 0.25: [], 0: [] };
      TYPES.forEach((atk) => {
        const m = calcMultiplier(atk, type1, type2);
        if (buckets[m] != null) buckets[m].push(atk);
        else buckets[1].push(atk);
      });
      return buckets;
    }

    function offensiveFromType(attacker) {
      const buckets = { 2: [], 1: [], 0.5: [], 0: [] };
      TYPES.forEach((def) => {
        const m = CHART[attacker]?.[def] ?? 1;
        if (buckets[m] != null) buckets[m].push(def);
      });
      return buckets;
    }

    const TypeBadge = ({ type, size = 'md' }) => {
      const c = TYPE_COLORS[type];
      const sizes = {
        sm: { padding: '4px 10px', fontSize: '10px' },
        md: { padding: '6px 14px', fontSize: '12px' },
        lg: { padding: '10px 18px', fontSize: '15px' },
      };
      return (
        <span
          style={{
            display: 'inline-flex',
            alignItems: 'center',
            gap: '6px',
            background: c.bg,
            color: c.text,
            fontFamily: '"Press Start 2P", monospace',
            letterSpacing: '0.5px',
            textTransform: 'uppercase',
            borderRadius: '2px',
            boxShadow: `0 0 0 2px ${c.text}, 3px 3px 0 0 ${c.text}`,
            ...sizes[size],
          }}
        >
          {type}
        </span>
      );
    };

    const Section = ({ title, types, accent, sublabel }) => (
      <div style={{ marginBottom: '18px' }}>
        <div
          style={{
            fontFamily: '"Press Start 2P", monospace',
            fontSize: '10px',
            color: accent,
            marginBottom: '10px',
            letterSpacing: '1px',
            textShadow: `2px 2px 0 rgba(0,0,0,0.3)`,
          }}
        >
          ▸ {title}
          {sublabel && (
            <span style={{ fontFamily: '"VT323", monospace', fontSize: '16px', color: '#999', marginLeft: '8px', letterSpacing: 0 }}>
              {sublabel}
            </span>
          )}
        </div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
          {types.length === 0 ? (
            <span
              style={{
                fontFamily: '"VT323", monospace',
                fontSize: '18px',
                color: '#666',
                fontStyle: 'italic',
                paddingLeft: '8px',
              }}
            >
              — none —
            </span>
          ) : (
            types.map((t) => <TypeBadge key={t} type={t} size="sm" />)
          )}
        </div>
      </div>
    );

    function PokemonTypeChart() {
      const [mode, setMode] = useState('defensive');
      const [type1, setType1] = useState('Fire');
      const [type2, setType2] = useState(null);

      const c = TYPE_COLORS[type1];

      const handleTypeClick = (t) => {
        if (mode === 'offensive') {
          setType1(t);
          setType2(null);
          return;
        }
        if (t === type1) {
          if (type2) { setType1(type2); setType2(null); }
          return;
        }
        if (t === type2) {
          setType2(null);
          return;
        }
        if (!type2) {
          setType2(t);
        } else {
          setType2(t);
        }
      };

      const defensiveBuckets = useMemo(
        () => (mode === 'defensive' ? groupByMultiplier(type1, type2) : null),
        [mode, type1, type2]
      );

      const offensiveBuckets = useMemo(
        () => (mode === 'offensive' ? offensiveFromType(type1) : null),
        [mode, type1]
      );

      return (
        <div
          className="pkmn-bg"
          style={{
            minHeight: '100vh',
            background: `
              radial-gradient(circle at 20% 10%, ${c.glow}25 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, ${c.bg}20 0%, transparent 50%),
              linear-gradient(180deg, #0a0a1a 0%, #1a0a2a 100%)
            `,
            padding: '32px 18px',
            position: 'relative',
            overflow: 'hidden',
            transition: 'background 0.6s ease',
          }}
        >
          <div style={{ maxWidth: '1100px', margin: '0 auto', position: 'relative', zIndex: 2 }}>
            <div style={{ textAlign: 'center', marginBottom: '28px' }}>
              <div
                style={{
                  fontFamily: '"VT323", monospace',
                  fontSize: '18px',
                  color: c.glow,
                  letterSpacing: '4px',
                  marginBottom: '4px',
                  transition: 'color 0.4s',
                }}
              >
                ◆ TYPE MATCHUP DATABASE ◆
              </div>
              <h1
                style={{
                  fontFamily: '"Press Start 2P", monospace',
                  fontSize: 'clamp(18px, 4vw, 28px)',
                  color: '#fff',
                  margin: 0,
                  letterSpacing: '2px',
                  textShadow: `4px 4px 0 ${c.bg}, 8px 8px 0 rgba(0,0,0,0.4)`,
                  transition: 'text-shadow 0.4s',
                }}
              >
                POKéDEX MATCHUP
              </h1>
            </div>

            <div
              style={{
                display: 'flex',
                gap: '10px',
                justifyContent: 'center',
                marginBottom: '24px',
                flexWrap: 'wrap',
              }}
            >
              {[
                { id: 'defensive', label: '🛡 DEFENSIVE' },
                { id: 'offensive', label: '⚔ OFFENSIVE' },
              ].map((m) => {
                const active = mode === m.id;
                return (
                  <button
                    key={m.id}
                    className="mode-btn"
                    onClick={() => setMode(m.id)}
                    style={{
                      background: active ? c.bg : 'rgba(0,0,0,0.5)',
                      color: active ? c.text : '#aaa',
                      fontFamily: '"Press Start 2P", monospace',
                      fontSize: '11px',
                      padding: '12px 18px',
                      border: 'none',
                      borderRadius: '2px',
                      cursor: 'pointer',
                      letterSpacing: '1px',
                      boxShadow: active
                        ? `0 0 0 3px #fff, 0 0 0 5px ${c.text}, 0 0 25px ${c.glow}`
                        : `0 0 0 2px rgba(255,255,255,0.2), 4px 4px 0 0 rgba(0,0,0,0.5)`,
                      transform: active ? 'translate(-1px, -1px)' : 'none',
                    }}
                  >
                    {m.label}
                  </button>
                );
              })}
            </div>

            <div
              style={{
                textAlign: 'center',
                fontFamily: '"VT323", monospace',
                fontSize: '20px',
                color: '#bbb',
                marginBottom: '16px',
                padding: '0 10px',
              }}
            >
              {mode === 'defensive'
                ? type2
                  ? 'Tap a third type to swap your secondary, or tap selected to deselect'
                  : 'Tap one or two types to build a dual-type defender'
                : 'Tap a type — see what its moves do offensively'}
            </div>

            <div
              style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fit, minmax(110px, 1fr))',
                gap: '8px',
                marginBottom: '32px',
                padding: '18px',
                background: 'rgba(0,0,0,0.4)',
                border: '3px solid rgba(255,255,255,0.15)',
                borderRadius: '4px',
              }}
            >
              {TYPES.map((t) => {
                const tc = TYPE_COLORS[t];
                const isPrimary = type1 === t;
                const isSecondary = mode === 'defensive' && type2 === t;
                const isSelected = isPrimary || isSecondary;
                return (
                  <button
                    key={t}
                    className="type-btn"
                    onClick={() => handleTypeClick(t)}
                    style={{
                      position: 'relative',
                      background: tc.bg,
                      color: tc.text,
                      fontFamily: '"Press Start 2P", monospace',
                      fontSize: '10px',
                      padding: '12px 6px',
                      border: 'none',
                      borderRadius: '2px',
                      cursor: 'pointer',
                      letterSpacing: '0.5px',
                      textTransform: 'uppercase',
                      boxShadow: isSelected
                        ? `0 0 0 3px #fff, 0 0 0 5px ${tc.text}, 0 0 22px ${tc.glow}`
                        : `0 0 0 2px ${tc.text}, 4px 4px 0 0 ${tc.text}`,
                      transform: isSelected ? 'translate(-1px, -1px)' : 'none',
                    }}
                  >
                    {isPrimary && (
                      <span
                        style={{
                          position: 'absolute',
                          top: '2px',
                          right: '4px',
                          fontSize: '8px',
                          color: tc.text,
                          opacity: 0.7,
                        }}
                      >
                        1
                      </span>
                    )}
                    {isSecondary && (
                      <span
                        style={{
                          position: 'absolute',
                          top: '2px',
                          right: '4px',
                          fontSize: '8px',
                          color: tc.text,
                          opacity: 0.7,
                        }}
                      >
                        2
                      </span>
                    )}
                    {t}
                  </button>
                );
              })}
            </div>

            <div
              style={{
                textAlign: 'center',
                marginBottom: '28px',
                padding: '20px',
                background: `linear-gradient(135deg, ${c.bg}40 0%, ${c.bg}10 100%)`,
                border: `3px solid ${c.bg}`,
                borderRadius: '4px',
              }}
            >
              <div
                style={{
                  fontFamily: '"VT323", monospace',
                  fontSize: '20px',
                  color: '#fff',
                  opacity: 0.7,
                  marginBottom: '12px',
                  letterSpacing: '2px',
                }}
              >
                {mode === 'defensive' ? 'DEFENDING TYPE' : 'ATTACKING TYPE'}
              </div>
              <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: '10px', flexWrap: 'wrap' }}>
                <TypeBadge type={type1} size="lg" />
                {mode === 'defensive' && type2 && (
                  <>
                    <span style={{ fontFamily: '"Press Start 2P", monospace', color: '#fff', fontSize: '14px' }}>/</span>
                    <TypeBadge type={type2} size="lg" />
                  </>
                )}
              </div>
              {mode === 'defensive' && type2 && (
                <button
                  onClick={() => setType2(null)}
                  style={{
                    marginTop: '14px',
                    background: 'transparent',
                    color: '#aaa',
                    border: '2px solid #555',
                    borderRadius: '2px',
                    padding: '6px 12px',
                    fontFamily: '"Press Start 2P", monospace',
                    fontSize: '9px',
                    cursor: 'pointer',
                    letterSpacing: '1px',
                  }}
                >
                  ✕ CLEAR SECONDARY
                </button>
              )}
            </div>

            {mode === 'defensive' ? (
              <div
                style={{
                  background: 'rgba(0,0,0,0.55)',
                  border: `3px solid ${c.bg}`,
                  borderRadius: '4px',
                  padding: '24px',
                  position: 'relative',
                  boxShadow: `6px 6px 0 0 rgba(0,0,0,0.5)`,
                }}
              >
                <div
                  style={{
                    position: 'absolute',
                    top: '-14px',
                    left: '20px',
                    background: c.bg,
                    color: c.text,
                    fontFamily: '"Press Start 2P", monospace',
                    fontSize: '11px',
                    padding: '6px 14px',
                    letterSpacing: '1px',
                    boxShadow: `0 0 0 2px ${c.text}`,
                  }}
                >
                  🛡 DAMAGE TAKEN
                </div>
                <div
                  style={{
                    fontFamily: '"VT323", monospace',
                    fontSize: '18px',
                    color: '#bbb',
                    marginTop: '12px',
                    marginBottom: '20px',
                    lineHeight: 1.3,
                  }}
                >
                  When attacked, <strong style={{ color: c.glow }}>{type1}{type2 ? `/${type2}` : ''}</strong> takes:
                </div>

                <Section title="QUAD WEAK" sublabel="(4× damage)" types={defensiveBuckets[4]} accent="#FF3D3D" />
                <Section title="WEAK" sublabel="(2× damage)" types={defensiveBuckets[2]} accent="#FF8F5D" />
                <Section title="NEUTRAL" sublabel="(1× damage)" types={defensiveBuckets[1]} accent="#CCCCCC" />
                <Section title="RESISTS" sublabel="(½× damage)" types={defensiveBuckets[0.5]} accent="#9DFF9D" />
                <Section title="DOUBLE RESIST" sublabel="(¼× damage)" types={defensiveBuckets[0.25]} accent="#5DFF8F" />
                <Section title="IMMUNE" sublabel="(0× damage)" types={defensiveBuckets[0]} accent="#5DCFFF" />
              </div>
            ) : (
              <div
                style={{
                  background: 'rgba(0,0,0,0.55)',
                  border: `3px solid ${c.bg}`,
                  borderRadius: '4px',
                  padding: '24px',
                  position: 'relative',
                  boxShadow: `6px 6px 0 0 rgba(0,0,0,0.5)`,
                }}
              >
                <div
                  style={{
                    position: 'absolute',
                    top: '-14px',
                    left: '20px',
                    background: c.bg,
                    color: c.text,
                    fontFamily: '"Press Start 2P", monospace',
                    fontSize: '11px',
                    padding: '6px 14px',
                    letterSpacing: '1px',
                    boxShadow: `0 0 0 2px ${c.text}`,
                  }}
                >
                  ⚔ DAMAGE DEALT
                </div>
                <div
                  style={{
                    fontFamily: '"VT323", monospace',
                    fontSize: '18px',
                    color: '#bbb',
                    marginTop: '12px',
                    marginBottom: '20px',
                    lineHeight: 1.3,
                  }}
                >
                  When <strong style={{ color: c.glow }}>{type1}</strong> moves attack these types:
                </div>

                <Section title="SUPER EFFECTIVE" sublabel="(2× damage)" types={offensiveBuckets[2]} accent="#5DFF8F" />
                <Section title="NEUTRAL" sublabel="(1× damage)" types={offensiveBuckets[1]} accent="#CCCCCC" />
                <Section title="NOT VERY EFFECTIVE" sublabel="(½× damage)" types={offensiveBuckets[0.5]} accent="#FF8F5D" />
                <Section title="NO EFFECT" sublabel="(0× damage)" types={offensiveBuckets[0]} accent="#FF5D5D" />
              </div>
            )}

            <div
              style={{
                textAlign: 'center',
                marginTop: '32px',
                fontFamily: '"VT323", monospace',
                fontSize: '16px',
                color: '#666',
                letterSpacing: '2px',
              }}
            >
              ▾ DUAL-TYPE SUPPORTED IN DEFENSIVE MODE ▾
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PokemonTypeChart />);
  </script>
</body>
</html>
